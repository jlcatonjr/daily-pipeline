site_name: Daily Pipeline
site_description: Standalone multi-team daily pipeline with AgentTeams integration and orchestration extension guidance.
site_url: https://jlcatonjr.github.io/daily-pipeline/
repo_url: https://github.com/jlcatonjr/daily-pipeline
repo_name: jlcatonjr/daily-pipeline
edit_uri: edit/main/docs_src/
docs_dir: docs_src
site_dir: site
use_directory_urls: true
site_author: jlcatonjr
extra:
  generator: false
copyright: "&copy; <span id='copyright-year'></span> jlcatonjr"
extra_javascript:
  - javascripts/current-year.js

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - How It Works: how-it-works.md
  - CLI Reference: cli-reference.md
  - Stage Contracts: stage-contracts.md
  - Extended Operations: extended-operations.md
  - API Reference:
      - Overview: api-reference/index.md
      - cli: api-reference/cli.md
      - config: api-reference/config.md
      - protocol: api-reference/protocol.md
      - models: api-reference/models.md
      - integration.agentteams: api-reference/integration-agentteams.md
      - integration.sync: api-reference/integration-sync.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true
